config:
  # Disable line length checks so tutorial prose can wrap naturally.
  MD013: false

# Lint all Markdown files in the repository.
globs:
  - "**/*.md"

# Exclude the Marp slide deck: a deck uses inline HTML and one
# top-level heading per slide, which the prose rules would otherwise flag.
ignores:
  - "introduction/**"
  - ".venv/**"
